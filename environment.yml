name: fundlens
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip>=24.0
  # Phase 2 ML/DL
  - conda-forge::xgboost
  - conda-forge::lightgbm
  - pip:
      # Core pipeline + dashboard
      - yfinance>=0.2
      - requests>=2.31
      - duckdb>=0.10
      - duckdb-engine>=0.13
      - sqlalchemy>=2.0
      - pandas>=2.0
      - numpy>=1.26
      - streamlit>=1.35
      - plotly>=5.20
      - pydantic-settings>=2.0
      - python-dotenv>=1.0
      - loguru>=0.7
      - apscheduler>=3.10
      - pyyaml>=6.0
      # Phase 2 ML models
      - statsmodels>=0.14
      - prophet>=1.1
      - scikit-learn>=1.4
      - arch>=6.0
      # torch: after env create, run:
      # pip install torch --index-url https://download.pytorch.org/whl/cpu
      - torch>=2.3
      # Cloud PostgreSQL (enable when switching to Neon)
      - psycopg2-binary>=2.9
      # Dev tools
      - pytest>=8.0
      - pytest-cov>=5.0
      - ipykernel>=6.0
      - jupyter>=1.0
      - nbformat>=5.0
