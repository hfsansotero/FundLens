name: Daily NAV Update

on:
  schedule:
    - cron: "30 23 * * 1-5"  # ~18:30 ET Mon-Fri, first attempt (UTC, EST-anchored)
    - cron: "30 1 * * 2-6"   # ~20:30 ET Mon-Fri, retry 2h later if the first run missed data
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[postgres]"
      - run: python -c "from fundlens.pipeline.daily_update import run_daily_update; run_daily_update()"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
